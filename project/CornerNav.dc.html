<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:fixed; inset:0; z-index:50; pointer-events:none; color:rgba(255,255,255,0.75); font-family:'Bricolage Grotesque',sans-serif;">

  <div aria-hidden="true" style="position:absolute; top:0; left:0; right:0; height:150px; background:linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0)); pointer-events:none;"></div>

  <a href="Home.dc.html" data-cut style="position:absolute; top:clamp(16px,2.3vw,30px); left:clamp(20px,2.6vw,34px); pointer-events:auto; display:block; transition:opacity .3s ease;" style-hover="opacity:0.62;" aria-label="Cossé TTL — home"><img src="cosse-white.png" alt="Cossé" style="display:block; height:clamp(24px,2.3vw,32px); width:auto;"></a>

  <button type="button" onClick="{{ openMenu }}" onMouseEnter="{{ enterMenuBtn }}" onMouseLeave="{{ leaveMenuBtn }}" aria-label="Open menu" style="{{ menuBtnStyle }}">
    <span aria-hidden="true" style="display:inline-flex; flex-direction:column; gap:4px; width:17px;">
      <span style="display:block; height:1.5px; width:100%; background:currentColor;"></span>
      <span style="display:block; height:1.5px; width:100%; background:currentColor;"></span>
    </span>
    Menu
  </button>

  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
    <a href="Contact.dc.html" data-cut style="position:absolute; bottom:clamp(18px,2.6vw,34px); left:clamp(20px,2.6vw,34px); pointer-events:auto; font-size:12px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; transition:opacity .3s ease;" style-hover="opacity:0.62;">Start a project</a>
    <a href="https://instagram.com" target="_blank" rel="noopener" style="position:absolute; bottom:clamp(18px,2.6vw,34px); right:clamp(20px,2.6vw,34px); pointer-events:auto; font-size:12px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; transition:opacity .3s ease;" style-hover="opacity:0.62;">Follow</a>
  </sc-if>

  <!-- scroll-progress track + acute marker -->
  <div aria-hidden="true" style="position:absolute; top:0; bottom:0; right:0; width:1px; background:rgba(255,255,255,0.1);">
    <div data-progress style="position:absolute; top:0; right:-6px; width:13px; height:13px; color:#FFFFFF; transform:translateY(0);"><svg viewBox="0 0 12 12" fill="none" style="width:100%;height:100%;display:block"><line x1="3" y1="9" x2="9" y2="3" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></line></svg></div>
  </div>

  <!-- overlay menu -->
  <div style="{{ menuStyle }}">
    <button type="button" onClick="{{ closeMenu }}" aria-label="Close menu" style="position:absolute; top:clamp(18px,2.6vw,34px); right:clamp(20px,2.6vw,34px); pointer-events:auto; background:none; border:none; cursor:pointer; font-family:'Bricolage Grotesque',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:#FFFFFF; padding:10px 4px; transition:opacity .3s ease;" style-hover="opacity:0.62;">Close</button>
    <img src="cosse-white.png" alt="Cossé" style="position:absolute; top:clamp(16px,2.3vw,30px); left:clamp(20px,2.6vw,34px); height:clamp(24px,2.3vw,32px); width:auto;">
    <div style="max-width:1320px; margin:0 auto; width:100%; display:flex; flex-wrap:wrap; gap:clamp(36px,5vw,90px); justify-content:space-between; align-items:flex-end;">
      <nav aria-label="Primary" style="display:flex; flex-direction:column; gap:clamp(2px,0.6vw,8px);">
        <sc-for list="{{ menuPrimary }}" as="ml" hint-placeholder-count="4">
          <a href="{{ ml.href }}" data-cut onClick="{{ closeMenu }}" onMouseEnter="{{ ml.onEnter }}" onMouseLeave="{{ ml.onLeave }}" style="display:flex; align-items:baseline; gap:0.34em; width:fit-content; font-weight:500; font-size:clamp(2rem,7.5vw,4.2rem); line-height:1.12; letter-spacing:-0.02em; color:{{ ml.color }}; transition:color .35s ease;">
            <span aria-hidden="true" style="display:inline-block; width:0.42em; height:0.42em; flex:0 0 auto; align-self:center; color:#FFFFFF; opacity:{{ ml.acuteOp }}; transform:translateX({{ ml.acuteX }}); transition:opacity .35s cubic-bezier(0.16,1,0.3,1), transform .35s cubic-bezier(0.16,1,0.3,1);"><svg viewBox="0 0 12 12" fill="none" style="width:100%;height:100%;display:block"><line x1="3" y1="9" x2="9" y2="3" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></line></svg></span>
            {{ ml.label }}
            <span style="font-size:0.82rem; font-weight:500; letter-spacing:0.1em; color:rgba(255,255,255,0.3);">{{ ml.idx }}</span>
          </a>
        </sc-for>
      </nav>
      <div style="display:flex; flex-direction:column; gap:16px; min-width:min(100%,240px);">
        <span style="font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.35);">More</span>
        <sc-for list="{{ menuSecondary }}" as="ms" hint-placeholder-count="2">
          <a href="{{ ms.href }}" data-cut onClick="{{ closeMenu }}" style="font-size:clamp(1.3rem,2.3vw,1.7rem); font-weight:500; letter-spacing:-0.01em; color:rgba(255,255,255,0.85); text-decoration:none; transition:opacity .3s ease;" style-hover="opacity:0.6;">{{ ms.label }}</a>
        </sc-for>
        <div style="height:1px; background:rgba(255,255,255,0.14); margin:10px 0 6px;"></div>
        <a href="mailto:newbusiness@cosse-ttl.example" style="font-size:13px; letter-spacing:0.02em; color:rgba(255,255,255,0.6); text-decoration:none; transition:color .3s ease;" style-hover="color:#FFFFFF;">newbusiness@cosse-ttl.example</a>
        <div style="display:flex; gap:20px; margin-top:2px;">
          <a href="https://instagram.com" target="_blank" rel="noopener" style="font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.5); text-decoration:none; transition:color .3s ease;" style-hover="color:#FFFFFF;">Instagram</a>
          <a href="https://linkedin.com" target="_blank" rel="noopener" style="font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.5); text-decoration:none; transition:color .3s ease;" style-hover="color:#FFFFFF;">LinkedIn</a>
        </div>
      </div>
    </div>
    <p style="position:absolute; bottom:clamp(20px,4vw,40px); left:clamp(20px,5vw,60px); right:clamp(20px,5vw,60px); margin:0; font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.4);">Integrated Marketing Communications &mdash; Lagos, Nigeria</p>
  </div>

  <!-- film-cut slate bars -->
  <div data-bar="top" aria-hidden="true" style="position:fixed; left:0; right:0; top:0; height:51%; background:#000000; z-index:92; transform:translateY(-101%); pointer-events:none;"></div>
  <div data-bar="bot" aria-hidden="true" style="position:fixed; left:0; right:0; bottom:0; height:51%; background:#000000; z-index:92; transform:translateY(101%); pointer-events:none;"></div>

  <!-- acute custom cursor (desktop, motion-on only; sits EXACTLY on the pointer) -->
  <div data-cursor aria-hidden="true" style="position:fixed; top:0; left:0; width:22px; height:22px; margin:-11px 0 0 -11px; color:#FFFFFF; z-index:95; pointer-events:none; opacity:0; transition:opacity .25s ease, width .22s cubic-bezier(0.16,1,0.3,1), height .22s cubic-bezier(0.16,1,0.3,1), margin .22s cubic-bezier(0.16,1,0.3,1);"><svg viewBox="0 0 12 12" fill="none" style="width:100%;height:100%;display:block"><line x1="3" y1="9" x2="9" y2="3" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"></line></svg></div>

  <!-- acute loader -->
  <div data-loader aria-hidden="true" style="position:fixed; inset:0; z-index:99; background:#000000; display:flex; align-items:center; justify-content:center; pointer-events:none;"><span style="display:block; width:32px; height:32px; color:#FFFFFF; transform:rotate(-12deg);"><svg viewBox="0 0 12 12" fill="none" style="width:100%;height:100%;display:block"><line x1="3" y1="9" x2="9" y2="3" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></line></svg></span></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 }
}">
class Component extends DCLogic {
  state = { menuOpen: false, w: 1280, hovMenu: null, hovMenuBtn: false };

  componentDidMount() {
    this.setState({ w: window.innerWidth });
    this._onResize = () => {
      if (window.innerWidth !== this.state.w) this.setState({ w: window.innerWidth });
    };
    window.addEventListener("resize", this._onResize);
    this._onKey = (e) => {
      if (e.key === "Escape" && this.state.menuOpen) this._close();
    };
    window.addEventListener("keydown", this._onKey);

    this._reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    this._touch = window.matchMedia && window.matchMedia("(hover: none)").matches;

    // Acute loader: lift on a real-time beat (never relies on the animation clock).
    const loader = document.querySelector("[data-loader]");
    if (loader) {
      if (this._reduced) {
        loader.style.display = "none";
      } else {
        loader.style.transition = "opacity .5s cubic-bezier(0.16,1,0.3,1)";
        setTimeout(() => { loader.style.opacity = "0"; }, 280);
        setTimeout(() => { loader.style.display = "none"; }, 850);
      }
    }

    if (!this._reduced && !this._touch && window.innerWidth >= 768) this._initCursor();
    this._initScrollProgress();
    this._initFilmCut();
  }

  _initCursor() {
    const cur = document.querySelector("[data-cursor]");
    if (!cur) return;
    document.documentElement.style.cursor = "none";
    let tx = window.innerWidth / 2, ty = window.innerHeight / 2, px = tx, rot = 0, shown = false;
    const apply = () => {
      cur.style.transform = "translate3d(" + tx + "px," + ty + "px,0) rotate(" + rot.toFixed(2) + "deg)";
    };
    // Position is set DIRECTLY from the pointer every move — zero positional lag,
    // so the click target under the acute is always the real one. Only the tilt eases.
    this._onMove = (e) => {
      tx = e.clientX; ty = e.clientY;
      rot = Math.max(-20, Math.min(20, (tx - px) * 0.5));
      px = tx;
      if (!shown) { shown = true; cur.style.opacity = "1"; }
      apply();
    };
    this._onOver = (e) => {
      const t = e.target;
      const interactive = t.closest && t.closest('a,button,[role="button"],input,textarea,[data-hit]');
      cur.style.width = interactive ? "42px" : "22px";
      cur.style.height = interactive ? "42px" : "22px";
      cur.style.margin = interactive ? "-21px 0 0 -21px" : "-11px 0 0 -11px";
    };
    this._onDown = () => { cur.style.width = "12px"; cur.style.height = "12px"; cur.style.margin = "-6px 0 0 -6px"; };
    this._onUp = () => { cur.style.width = "22px"; cur.style.height = "22px"; cur.style.margin = "-11px 0 0 -11px"; };
    window.addEventListener("mousemove", this._onMove, { passive: true });
    window.addEventListener("mouseover", this._onOver, { passive: true });
    window.addEventListener("mousedown", this._onDown);
    window.addEventListener("mouseup", this._onUp);
    const loop = () => {
      rot += (0 - rot) * 0.08; // tilt settles back to upright
      apply();
      this._curRaf = requestAnimationFrame(loop);
    };
    this._curRaf = requestAnimationFrame(loop);
  }

  _initScrollProgress() {
    const m = document.querySelector("[data-progress]");
    if (!m) return;
    this._onScroll = () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const p = h > 0 ? window.scrollY / h : 0;
      m.style.transform = "translateY(" + p * (window.innerHeight - 13) + "px)";
    };
    this._onScroll();
    window.addEventListener("scroll", this._onScroll, { passive: true });
    window.addEventListener("resize", this._onScroll);
  }

  _initFilmCut() {
    const top = document.querySelector('[data-bar="top"]');
    const bot = document.querySelector('[data-bar="bot"]');
    this._onCutClick = (e) => {
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.button) return;
      const a = e.target.closest && e.target.closest("a[data-cut]");
      if (!a) return;
      const href = a.getAttribute("href") || "";
      if (!/\.dc\.html/i.test(href) || a.target === "_blank") return;
      // Same-document links must NOT trigger a full-page cut/reload.
      const base = href.split("#")[0];
      const curName = location.pathname.split("/").pop() || "Home.dc.html";
      const sameDoc = base === "" || decodeURIComponent(base) === decodeURIComponent(curName);
      if (sameDoc) {
        if (href.indexOf("#") === -1) {
          e.preventDefault();
          window.scrollTo({ top: 0, behavior: this._reduced ? "auto" : "smooth" });
        }
        return; // hash on same page → let the browser do the in-page jump
      }
      if (this._reduced || !top || !bot) return;
      e.preventDefault();
      top.style.transition = "transform .5s cubic-bezier(0.85,0,0.15,1)";
      bot.style.transition = "transform .5s cubic-bezier(0.85,0,0.15,1)";
      top.style.transform = "translateY(0)";
      bot.style.transform = "translateY(0)";
      setTimeout(() => { window.location.href = href; }, 520);
    };
    document.addEventListener("click", this._onCutClick);
  }

  componentWillUnmount() {
    window.removeEventListener("resize", this._onResize);
    window.removeEventListener("keydown", this._onKey);
    if (this._onMove) window.removeEventListener("mousemove", this._onMove);
    if (this._onOver) window.removeEventListener("mouseover", this._onOver);
    if (this._onDown) window.removeEventListener("mousedown", this._onDown);
    if (this._onUp) window.removeEventListener("mouseup", this._onUp);
    if (this._onScroll) window.removeEventListener("scroll", this._onScroll);
    if (this._onCutClick) document.removeEventListener("click", this._onCutClick);
    if (this._curRaf) cancelAnimationFrame(this._curRaf);
    document.documentElement.style.cursor = "";
    document.documentElement.style.overflow = "";
    document.body.style.overflow = "";
  }

  _open() {
    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";
    this.setState({ menuOpen: true });
  }
  _close() {
    document.documentElement.style.overflow = "";
    document.body.style.overflow = "";
    this.setState({ menuOpen: false });
  }

  renderVals() {
    const { menuOpen, w, hovMenu, hovMenuBtn } = this.state;
    const prim = [
      { label: "Work", href: "Work.dc.html" },
      { label: "Capabilities", href: "Capabilities.dc.html" },
      { label: "Studio", href: "Studio.dc.html" },
      { label: "About", href: "About.dc.html" },
      { label: "Thinking", href: "Thinking.dc.html" },
    ];
    const menuPrimary = prim.map((l, i) => ({
      label: l.label,
      href: l.href,
      idx: String(i + 1).padStart(2, "0"),
      color: hovMenu === null || hovMenu === i ? "rgba(255,255,255,0.92)" : "rgba(255,255,255,0.3)",
      acuteOp: hovMenu === i ? 1 : 0,
      acuteX: hovMenu === i ? "0px" : "-12px",
      onEnter: () => this.setState({ hovMenu: i }),
      onLeave: () => this.setState({ hovMenu: null }),
    }));
    const menuSecondary = [
      { label: "Start a project", href: "Contact.dc.html" },
      { label: "Careers", href: "Careers.dc.html" },
    ];
    return {
      isMobile: w < 768,
      isDesktop: w >= 768,
      openMenu: () => this._open(),
      closeMenu: () => this._close(),
      enterMenuBtn: () => this.setState({ hovMenuBtn: true }),
      leaveMenuBtn: () => this.setState({ hovMenuBtn: false }),
      menuBtnStyle: {
        position: "absolute", top: "clamp(14px,2.4vw,30px)", right: "clamp(16px,2.6vw,30px)",
        pointerEvents: "auto", cursor: "pointer",
        display: "inline-flex", alignItems: "center", gap: "10px",
        fontFamily: "'Bricolage Grotesque',sans-serif", fontSize: "12px", fontWeight: 600,
        letterSpacing: "0.2em", textTransform: "uppercase",
        padding: "11px 16px",
        border: "1px solid " + (hovMenuBtn ? "#FFFFFF" : "rgba(255,255,255,0.34)"),
        background: hovMenuBtn ? "#FFFFFF" : "rgba(0,0,0,0.24)",
        color: hovMenuBtn ? "#000000" : "#FFFFFF",
        backdropFilter: "blur(6px)", WebkitBackdropFilter: "blur(6px)",
        transition: "background .3s ease, color .3s ease, border-color .3s ease",
      },
      menuPrimary,
      menuSecondary,
      menuStyle: {
        position: "fixed", inset: "0", zIndex: 60, background: "rgba(0,0,0,0.94)",
        backdropFilter: "blur(7px)", WebkitBackdropFilter: "blur(7px)",
        display: "flex", flexDirection: "column", justifyContent: "center",
        padding: "clamp(72px,10vw,120px) clamp(20px,5vw,60px)",
        pointerEvents: menuOpen ? "auto" : "none",
        opacity: menuOpen ? 1 : 0,
        visibility: menuOpen ? "visible" : "hidden",
        transition: "opacity .5s cubic-bezier(0.16,1,0.3,1)",
      },
    };
  }
}
</script>
</body>
</html>
