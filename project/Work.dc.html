<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Work — Cossé TTL</title>
<meta name="description" content="Thirty years of work, told as stories worth entering. Selected campaigns across brand, media, experiential, social, public sector and production.">
<meta name="theme-color" content="#000000">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20fill%3D%22%23000%22%2F%3E%3Cline%20x1%3D%2211%22%20y1%3D%2222%22%20x2%3D%2221%22%20y2%3D%2210%22%20stroke%3D%22%23fff%22%20stroke-width%3D%223.4%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Cossé TTL">
<meta property="og:title" content="Work — Cossé TTL">
<meta property="og:description" content="Thirty years of work, told as stories worth entering. Selected campaigns across brand, media, experiential, social, public sector and production.">
<meta property="og:image" content="og.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://www.youtube-nocookie.com">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{background:#000000; color:#FFFFFF; font-family:'Bricolage Grotesque',sans-serif; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow-x:hidden;}
    ::selection{background:#FFFFFF; color:#000000;}
    a{text-decoration:none}
    a:link, a:visited{color:inherit}
    a:focus-visible, button:focus-visible{outline:1px solid #FFFFFF; outline-offset:4px;}
    @keyframes grainDrift{from{background-position:0 0} to{background-position:220px 440px}}
    ::-webkit-scrollbar{width:8px;height:8px} ::-webkit-scrollbar-track{background:#000} ::-webkit-scrollbar-thumb{background:#222} ::-webkit-scrollbar-thumb:hover{background:#333}
    html{scrollbar-width:thin; scrollbar-color:#222 #000}
    @media (prefers-reduced-motion: reduce){*{animation:none !important}}
  </style>
  <noscript><style>[data-reveal],[data-hero]{opacity:1 !important; transform:none !important}</style></noscript>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
</helmet>

<div style="position:fixed; inset:0; z-index:50; pointer-events:none;">
  <dc-import name="CornerNav" style="position:absolute; inset:0; pointer-events:none;" hint-size="100%,100%"></dc-import>
</div>

<main style="background:#000000; min-height:100vh;">

  <!-- ════════════ INTRO ════════════ -->
  <section data-screen-label="Work intro" style="background:#000000; padding:clamp(132px,18vh,220px) clamp(20px,5vw,60px) clamp(40px,5vw,64px);">
    <div style="max-width:1320px; margin:0 auto;">
      <p data-hero data-d="0" style="font-family:'Bricolage Grotesque',sans-serif; font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.55); margin:0; opacity:0; transform:translateY(16px); transition:opacity .8s cubic-bezier(0.16,1,0.3,1), transform .8s cubic-bezier(0.16,1,0.3,1);">The archive</p>
      <h1 data-hero data-d="130" style="font-family:'Bricolage Grotesque',sans-serif; font-weight:500; font-size:clamp(2.4rem,6vw,5rem); line-height:1.0; letter-spacing:-0.03em; color:#FFFFFF; margin:20px 0 0; max-width:18ch; text-wrap:balance; opacity:0; transform:translateY(16px); transition:opacity .9s cubic-bezier(0.16,1,0.3,1), transform .9s cubic-bezier(0.16,1,0.3,1), font-variation-settings .9s cubic-bezier(0.16,1,0.3,1); font-variation-settings:'wght' 340;" data-wght="680">Thirty years, told as stories worth entering.</h1>
    </div>
  </section>

  <!-- ════════════ FILTER ROW ════════════ -->
  <section data-screen-label="Filters" style="background:#000000; padding:0 clamp(20px,5vw,60px);">
    <div data-reveal style="opacity:0; transform:translateY(16px); transition:opacity .8s cubic-bezier(0.16,1,0.3,1), transform .8s cubic-bezier(0.16,1,0.3,1); max-width:1320px; margin:0 auto; display:flex; flex-wrap:wrap; gap:8px 10px; padding:18px 0; background:#000000; border-bottom:1px solid rgba(255,255,255,0.12);">
      <sc-for list="{{ chips }}" as="chip" hint-placeholder-count="7">
        <button type="button" onClick="{{ chip.onClick }}" style="{{ chip.style }}"><span aria-hidden="true" style="display:inline-block; width:0.62em; height:0.62em; margin-right:0.34em; color:#FFFFFF; opacity:{{ chip.acuteOp }}; transition:opacity .3s ease;"><svg viewBox="0 0 12 12" fill="none" style="width:100%;height:100%;display:block"><line x1="3" y1="9" x2="9" y2="3" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></line></svg></span>{{ chip.label }}</button>
      </sc-for>
    </div>
  </section>

  <!-- ════════════ GRID ════════════ -->
  <!-- NOTE: typographic placeholders — real 16:9 film/stills slot into each card at production. -->
  <section data-screen-label="Work grid" style="background:#000000; padding:clamp(40px,5vw,72px) clamp(20px,5vw,60px) clamp(96px,13vw,170px);">
    <div style="max-width:1320px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit, minmax(min(100%, 500px), 1fr)); gap:clamp(24px,3vw,52px);">
      <sc-for list="{{ items }}" as="item" hint-placeholder-count="6">
        <div data-reveal data-d="{{ item.d }}" style="opacity:0; transform:translateY(18px); transition:opacity .8s cubic-bezier(0.16,1,0.3,1), transform .8s cubic-bezier(0.16,1,0.3,1); grid-column:{{ item.col }};">
          <a href="{{ item.href }}" onMouseEnter="{{ item.onEnter }}" onMouseLeave="{{ item.onLeave }}" style="opacity:{{ item.op }}; pointer-events:{{ item.pe }}; display:block; transition:opacity .5s cubic-bezier(0.16,1,0.3,1);">
            <div style="position:relative; overflow:hidden; aspect-ratio:16/9; background:#141414; display:flex; align-items:center; justify-content:center;">
              <span aria-hidden="true" style="font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(3.5rem,12vw,8rem); color:rgba(255,255,255,0.05); letter-spacing:-0.04em; line-height:1;">{{ item.keyword }}</span>
              <div aria-hidden="true" style="position:absolute; inset:0; background-image:url(grain.png); background-size:200px; opacity:0.4; mix-blend-mode:overlay; pointer-events:none;"></div>
              <span style="position:absolute; top:14px; left:14px; font-family:'Bricolage Grotesque',sans-serif; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.5);">{{ item.idx }}</span>
              <span style="position:absolute; top:14px; right:14px; font-family:'Bricolage Grotesque',sans-serif; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.5);">{{ item.discipline }}</span>
            </div>
            <div style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:baseline; gap:10px 18px; padding-top:18px;">
              <h2 style="font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:clamp(1.45rem,2.6vw,2.1rem); line-height:1.06; letter-spacing:-0.02em; color:#FFFFFF; margin:0;">{{ item.title }}</h2>
              <span style="font-family:'Bricolage Grotesque',sans-serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.55); white-space:nowrap;">{{ item.client }} &middot; {{ item.year }}</span>
            </div>
            <p style="font-family:'Bricolage Grotesque',sans-serif; font-weight:400; font-size:clamp(0.98rem,1.4vw,1.12rem); line-height:1.5; color:rgba(255,255,255,0.55); margin:10px 0 0; max-width:48ch;">{{ item.idea }}</p>
          </a>
        </div>
      </sc-for>
    </div>
  </section>
  <dc-import name="StartBand" title="Your brief could be next." hint-size="100%,560px"></dc-import>

</main>

<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { content: null, filter: "All", hov: null, w: 1280 };

  componentDidMount() {
    import(new URL("./content.js", document.baseURI).href)
      .then((m) => this.setState({ content: m.default || m }))
      .catch((e) => console.warn("content load failed", e));

    this.setState({ w: window.innerWidth });
    this._onResize = () => {
      if (window.innerWidth !== this.state.w) this.setState({ w: window.innerWidth });
    };
    window.addEventListener("resize", this._onResize);

    this._reduced =
      window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    setTimeout(() => {
      document.querySelectorAll("[data-hero]").forEach((el) => this._reveal(el));
    }, 60);

    if (this._reduced) {
      document.querySelectorAll("[data-reveal]").forEach((el) => this._reveal(el));
    } else {
      try {
        this._io = new IntersectionObserver(
          (entries) => {
            entries.forEach((en) => {
              if (en.isIntersecting) {
                this._reveal(en.target);
                this._io.unobserve(en.target);
              }
            });
          },
          { threshold: 0.08, rootMargin: "0px 0px -6% 0px" }
        );
        this._scan = () =>
          document.querySelectorAll("[data-reveal]").forEach((el) => {
            if (!el.dataset.obs) {
              el.dataset.obs = "1";
              this._io.observe(el);
            }
          });
        this._scan();
      } catch (e) {
        document.querySelectorAll("[data-reveal]").forEach((el) => this._reveal(el));
      }
    }

    this._allFailsafe = setTimeout(() => {
      document.querySelectorAll("[data-reveal]").forEach((el) => this._reveal(el));
    }, 2500);

    if (!this._reduced) this._initLenis(0);
  }

  _reveal(el) {
    if (el.dataset.shown) return;
    el.dataset.shown = "1";
    const d = parseInt(el.dataset.d || "0", 10);
    const rest = el.dataset.tf || "none";
    if (this._reduced) {
      el.style.transition = "none";
      el.style.opacity = "1";
      el.style.transform = rest;
      if (el.dataset.wght) el.style.fontVariationSettings = "'wght' " + el.dataset.wght;
      return;
    }
    el.style.transitionDelay = d + "ms";
    el.style.opacity = "1";
    el.style.transform = rest;
      if (el.dataset.wght) el.style.fontVariationSettings = "'wght' " + el.dataset.wght;
    setTimeout(() => {
      if (!el.isConnected) return;
      el.style.transition = "none";
      el.style.transitionDelay = "0ms";
      el.style.opacity = "1";
      el.style.transform = rest;
      if (el.dataset.wght) el.style.fontVariationSettings = "'wght' " + el.dataset.wght;
    }, d + 1000);
  }

  _initLenis(tries) {
    if (window.Lenis) {
      try {
        this._lenis = new window.Lenis({ lerp: 0.09, wheelMultiplier: 1.0, smoothWheel: true });
        const raf = (t) => {
          if (!this._lenis) return;
          this._lenis.raf(t);
          this._raf = requestAnimationFrame(raf);
        };
        this._raf = requestAnimationFrame(raf);
      } catch (e) {}
      return;
    }
    if (tries < 25) setTimeout(() => this._initLenis(tries + 1), 120);
  }

  componentDidUpdate() {
    if (this._scan && !this._reduced) this._scan();
  }

  componentWillUnmount() {
    window.removeEventListener("resize", this._onResize);
    if (this._io) this._io.disconnect();
    if (this._allFailsafe) clearTimeout(this._allFailsafe);
    if (this._raf) cancelAnimationFrame(this._raf);
    if (this._lenis) {
      try {
        this._lenis.destroy();
      } catch (e) {}
      this._lenis = null;
    }
  }

  renderVals() {
    const c = this.state.content;
    const filter = this.state.filter;
    const hov = this.state.hov;
    const pad2 = (n) => String(n).padStart(2, "0");
    const cases = c && c.cases ? c.cases : [];
    const items = cases.map((x, i) => {
      const visible = filter === "All" || x.discipline === filter;
      const op = !visible ? 0.14 : hov !== null && hov !== i ? 0.42 : 1;
      return {
        title: x.title,
        client: x.client,
        year: x.year,
        keyword: x.keyword,
        idea: x.idea,
        discipline: x.discipline,
        idx: pad2(i + 1),
        href: "Case Study.dc.html?slug=" + x.slug,
        d: (i % 2) * 70,
        col: i === 0 ? "1 / -1" : "auto",
        feat: i === 0,
        op,
        pe: visible ? "auto" : "none",
        onEnter: () => this.setState({ hov: i }),
        onLeave: () => this.setState({ hov: null }),
      };
    });
    const labels = ["All"].concat(c && c.disciplines ? c.disciplines : []);
    const chips = labels.map((label) => {
      const active = label === filter;
      return {
        label: label,
        acuteOp: active ? 1 : 0,
        onClick: () => this.setState({ filter: label, hov: null }),
        style: {
          display: "inline-flex",
          alignItems: "center",
          fontFamily: "'Bricolage Grotesque',sans-serif",
          fontSize: "12px",
          fontWeight: 500,
          letterSpacing: "0.16em",
          textTransform: "uppercase",
          background: "none",
          border: "none",
          cursor: "pointer",
          padding: "8px 0",
          marginRight: "20px",
          color: active ? "#FFFFFF" : "rgba(255,255,255,0.4)",
          transition: "color .3s ease",
        },
      };
    });
    return { items, chips };
  }
}
</script>
</body>
</html>
